
<style>

  --bg-secondary: #1A1A2E;
  --bg-card: #16213E;
  --bg-hover: #0F3460;

  --text-secondary: #D1D5DB;

  --border-secondary: #4A5568;
  --border-accent: #667EEA;

* {

  margin: 0;
  padding: 0;
}

body {

}

.app {

}

@keyframes fadeInUp {

    transform: translateY(20px);

  to {
    opacity: 1;
    transform: translateY(0);
  }
}

}

  }
}

@keyframes shimmer {

.header {

}

}

.header h1 {

}

.stat {

}

.stat-val {

.pipe-stage.done .pipe-name {

}

.stage-assignee {

}

}

}

.pipe-stage.done .stage-assignee {

}

.pipe-stage.done .assignee-name {

}

.pipe-stage.active .stage-assignee {
  background: rgba(142, 158, 171, 0.1);
  border-color: rgba(142, 158, 171, 0.2);
}

.pipe-stage.active .assignee-name {
  color: white;
}

<div class="stats">
  <div class="stat"><div class="stat-label">Total videos</div><div class="stat-val" id="st-total">0</div></div>
  <div class="stat"><div class="stat-label">Entregados</div><div class="stat-val" id="st-done">0</div></div>
  <div class="stat"><div class="stat-label">En proceso</div><div class="stat-val" id="st-active">0</div></div>
  <div class="stat"><div class="stat-label">Pendientes</div><div class="stat-val" id="st-pending">0</div></div>
</div>

<div id="groups"></div>

<div class="modal-bg" id="modal">
  <div class="modal">
    <h2>Nuevo video</h2>
    <label>Título del video</label>
    <input id="new-title" placeholder="Ej: Video tutorial #1" />
    <label>Grupo / proyecto</label>
    <input id="new-group" placeholder="Ej: MKM, Pauta, Orgánico..." />
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-add" onclick="addVideo()">Agregar</button>
    </div>
  </div>
</div>
</div>

<div class="copy-modal-bg" id="copy-modal">
  <div class="copy-modal">
    <h3>Texto del Copy</h3>
    <textarea class="copy-textarea" id="copy-textarea" placeholder="Escribe aquí el texto del copy, guion, o información importante del video..." oninput="updateCopyButton()"></textarea>
    <div class="copy-modal-actions">
      <button class="btn-cancel" onclick="closeCopyModal()">Cancelar</button>
      <button class="btn-add" onclick="this.textContent === 'Editar' ? enableEdit() : saveCopyText()">Guardar</button>
    </div>
  </div>
</div>

<script>
let videos = [
  {id:1,title:'Video 1',group:'MKM',copyOk:true,recordingOk:true,driveLink:'https://drive.google.com/file/x',editLink:'https://drive.google.com/file/editado-x',deliveryOk:true,deliveryDate:'20/04/2026',expanded:false,copyText:'Este es el texto del copy para el Video 1. Contiene el guion y los puntos clave del contenido.'},
  {id:2,title:'Video 2',group:'MKM',copyOk:false,recordingOk:false,driveLink:'',editLink:'',deliveryOk:false,deliveryDate:'',expanded:false,copyText:''},
  {id:3,title:'Video 3',group:'MKM',copyOk:true,recordingOk:false,driveLink:'https://drive.google.com/file/y',editLink:'',deliveryOk:false,deliveryDate:'22/04/2026',expanded:false,copyText:'Copy del Video 3 con información importante sobre el tema a tratar.'},
  {id:4,title:'Video 4',group:'MKM',copyOk:false,recordingOk:true,driveLink:'',editLink:'',deliveryOk:false,deliveryDate:'',expanded:false,copyText:''},
  {id:5,title:'Video 1',group:'Pauta',copyOk:true,recordingOk:true,driveLink:'https://drive.google.com/file/z',editLink:'',deliveryOk:false,deliveryDate:'',expanded:false,copyText:'Texto copy para el Video 1 de Pauta. Detalles del contenido y objetivos.'},
  {id:6,title:'Video 2',group:'Pauta',copyOk:false,recordingOk:false,driveLink:'',editLink:'',deliveryOk:false,deliveryDate:'',expanded:false,copyText:''},
  {id:7,title:'Video 3',group:'Pauta',copyOk:true,recordingOk:true,driveLink:'https://drive.google.com/file/w',editLink:'https://drive.google.com/file/editado-w',deliveryOk:false,deliveryDate:'',expanded:false,copyText:'Copy del Video 3 de Pauta con toda la información necesaria.'},
  {id:8,title:'Video 4',group:'Pauta',copyOk:false,recordingOk:false,driveLink:'',editLink:'',deliveryOk:false,deliveryDate:'',expanded:false,copyText:''},
];
let currentCopyVideoId = null;
let nextId=9;

function getStatus(v){
  if(v.deliveryOk&&v.driveLink&&v.editLink) return 'entregado';
  if(v.editLink) return 'edicion';
  if(v.driveLink) return 'subido';
  return 'pendiente';
}
function getStatusLabel(s){
  return{entregado:'Entregado',edicion:'En edición',subido:'Subido',grabacion:'Grabación',pendiente:'Pendiente'}[s];
}
function getProgress(v){
  let s=getStatus(v);
  return{entregado:100,edicion:75,subido:55,grabacion:35,pendiente:10}[s];
}
function stageState(done,active){
  if(done) return 'done'; if(active) return 'active'; return 'pending';
}
function getPipeStages(v){
  let st=getStatus(v);
  let copyDone=v.copyOk;
  let recDone=v.recordingOk;
  let upDone=!!v.driveLink;
  let editDone=!!v.editLink;
  let delivDone=v.deliveryOk;
  return[
    {name:'Copy',state:stageState(copyDone,!copyDone),field:'copy'},
    {name:'Grabación',state:stageState(recDone,copyDone&&!recDone),field:'rec'},
    {name:'Drive link',state:stageState(upDone,recDone&&!upDone),field:'drive'},
    {name:'Edición',state:stageState(editDone,upDone&&!editDone),field:'edit'},
    {name:'Entrega',state:stageState(delivDone,editDone&&!delivDone),field:'deliv'},
  ];
}

function render(){
  const groups={};
  videos.forEach(v=>{
    if(!groups[v.group]) groups[v.group]=[];
    groups[v.group].push(v);
  });
  let html='';
  Object.entries(groups).forEach(([g,vids])=>{
    html+=`<div class="section-title" style="margin-top:1rem">${g}</div><div class="video-list">`;
    vids.forEach(v=>{
      const st=getStatus(v);
      const prog=getProgress(v);
      const stages=getPipeStages(v);
      const pills=stages.map(s=>`<span class="stage-pill ${s.state}">${s.name}</span>`).join(`<span class="stage-sep">›</span>`);
      const pipeHTML=stages.map(s=>{
        let inner='';
        if(s.field==='copy'){
          inner=`<div class="copy-text-wrapper">
            <label class="pipe-check"><input type="checkbox" ${v.copyOk?'checked':''} onchange="update(${v.id},'copyOk',this.checked)"> Aprobado</label>
            <button class="copy-text-btn" onclick="openCopyModal(${v.id})" title="Agregar texto del copy">
              <svg viewBox="0 0 24 24">
                <path d="M14,2H6A2,2 0 0,0 4,4V20A2,2 0 0,0 6,22H18A2,2 0 0,0 20,20V8L14,2M18,20H6V4H13V9H18V20M10,19L12,15H9V10H15V15L13,19H10Z"/>
              </svg>
            </button>
          </div>`;
        }
        else if(s.field==='rec'){
          inner=`<label class="pipe-check"><input type="checkbox" ${v.recordingOk?'checked':''} ${!v.copyOk?'disabled':''} onchange="update(${v.id},'recordingOk',this.checked)"> Listo</label>`;
        }
        else if(s.field==='drive'){
          inner=`<div class="drive-input-wrapper">
            <input class="pipe-input" placeholder="Pegar enlace Drive..." value="${v.driveLink||''}" onchange="update(${v.id},'driveLink',this.value)">
            <button class="link-btn" onclick="openDriveLink('${v.driveLink||''}')" ${!v.driveLink?'disabled':''} title="Abrir enlace Drive">
              <svg viewBox="0 0 24 24">
                <path d="M3.9 12c0-1.71 1.39-3.1 3.1-3.1h4V7H7c-2.76 0-5 2.24-5 5s2.24 5 5 5h4v-1.9H7c-1.71 0-3.1-1.39-3.1-3.1zM8 13h8v-2H8v2zm9-6h-4v1.9h4c1.71 0 3.1 1.39 3.1 3.1s-1.39 3.1-3.1 3.1h-4V17h4c2.76 0 5-2.24 5-5s-2.24-5-5-5z"/>
              </svg>
            </button>
          </div>`;
        }
        else if(s.field==='edit'){
          inner=`<div class="drive-input-wrapper">
            <input class="pipe-input" placeholder="Pegar enlace del video editado..." value="${v.editLink||''}" onchange="update(${v.id},'editLink',this.value)">
            <button class="link-btn" onclick="openDriveLink('${v.editLink||''}')" ${!v.editLink?'disabled':''} title="Abrir video editado">
              <svg viewBox="0 0 24 24">
                <path d="M3.9 12c0-1.71 1.39-3.1 3.1-3.1h4V7H7c-2.76 0-5 2.24-5 5s2.24 5 5 5h4v-1.9H7c-1.71 0-3.1-1.39-3.1-3.1zM8 13h8v-2H8v2zm9-6h-4v1.9h4c1.71 0 3.1 1.39 3.1 3.1s-1.39 3.1-3.1 3.1h-4V17h4c2.76 0 5-2.24 5-5s-2.24-5-5-5z"/>
              </svg>
            </button>
          </div>`;
        }
        else if(s.field==='deliv'){
          inner=`<div style="display:flex;flex-direction:column;gap:0.5rem">
            <label class="pipe-check"><input type="checkbox" ${v.deliveryOk?'checked':''} onchange="update(${v.id},'deliveryOk',this.checked)"> Listo</label>
            <input class="pipe-input" type="date" value="${v.deliveryDate?toInputDate(v.deliveryDate):''}" onchange="update(${v.id},'deliveryDate',toDisplayDate(this.value))">
          </div>`;
        }
        else{inner=`<span class="pipe-val">${s.state==='done'?'Listo':'Pendiente'}</span>`;}
        return`<div class="pipe-stage ${s.state}"><div class="pipe-name">${s.name}</div>${inner}</div>`;
      }).join('');
      html+=`<div class="video-row${v.expanded?' expanded':''}" id="row-${v.id}">
        <div class="row-main" onclick="toggle(${v.id})">
          <span class="row-title">${v.title}</span>
          <div class="stages">${pills}</div>
          <span class="row-status status-${st}">${getStatusLabel(st)}</span>
          <div class="progress-bar"><div class="progress-fill" style="width:${prog}%"></div></div>
        </div>
        <div class="detail">
          <div class="pipeline">${pipeHTML}</div>
          <div class="detail-actions"><button class="del-btn" onclick="deleteVideo(${v.id},event)">Eliminar</button></div>
        </div>
      </div>`;
    });
    html+='</div>';
  });
  if(!videos.length) html='<div class="empty">No hay videos. Agrega uno para comenzar.</div>';
  document.getElementById('groups').innerHTML=html;
  const total=videos.length;
  const done=videos.filter(v=>getStatus(v)==='entregado').length;
  const active=videos.filter(v=>['edicion','subido','grabacion'].includes(getStatus(v))).length;
  const pend=videos.filter(v=>getStatus(v)==='pendiente').length;
  document.getElementById('st-total').textContent=total;
  document.getElementById('st-done').textContent=done;
  document.getElementById('st-active').textContent=active;
  document.getElementById('st-pending').textContent=pend;
}

function toggle(id){
  const v=videos.find(x=>x.id===id);
  if(v) v.expanded=!v.expanded;
  render();
}
function update(id,field,val){
  const v=videos.find(x=>x.id===id);
  if(v){
    v[field]=val;
    // Si se aprueba el copy, desmarcar automáticamente la grabación
    if(field==='copyOk' && val===true){
      v.recordingOk = false;
    }
    render();
  }
}
function deleteVideo(id,e){
  e.stopPropagation();
  videos=videos.filter(x=>x.id!==id);
  render();
}
function openModal(){document.getElementById('modal').classList.add('show');}
function closeModal(){document.getElementById('modal').classList.remove('show');document.getElementById('new-title').value='';document.getElementById('new-group').value='';}
function addVideo(){
  const t=document.getElementById('new-title').value.trim();
  const g=document.getElementById('new-group').value.trim()||'General';
  if(!t) return;
  videos.push({id:nextId++,title:t,group:g,copyOk:false,recordingOk:false,driveLink:'',editLink:'',deliveryOk:false,deliveryDate:'',expanded:false,copyText:''});
  closeModal();render();
}
function toInputDate(d){
  if(!d) return '';
  const p=d.split('/');
  if(p.length===3) return`${p[2]}-${p[1].padStart(2,'0')}-${p[0].padStart(2,'0')}`;
  return d;
}
function toDisplayDate(d){
  if(!d) return '';
  const p=d.split('-');
  if(p.length===3) return`${p[2]}/${p[1]}/${p[0]}`;
  return d;
}
function openDriveLink(url){
  if(!url) return;
  // Validar que sea una URL válida
  if(url.startsWith('http')){
    window.open(url, '_blank');
  } else {
    // Si no tiene protocolo, agregar https://
    window.open('https://' + url, '_blank');
  }
}
function openCopyModal(videoId){
  currentCopyVideoId = videoId;
  const v = videos.find(x=>x.id===videoId);
  if(v){
    const textarea = document.getElementById('copy-textarea');
    textarea.value = v.copyText || '';
    // Guardar el texto original para detectar cambios
    textarea.dataset.originalText = v.copyText || '';
    const saveBtn = document.querySelector('#copy-modal .btn-add');
    const hasText = v.copyText && v.copyText.trim() !== '';
    saveBtn.textContent = hasText ? 'Editar' : 'Guardar';
    saveBtn.dataset.originalText = saveBtn.textContent; // Guardar estado original
    
    // Si hay texto, deshabilitar el textarea hasta que se haga clic en Editar
    if (hasText) {
      textarea.disabled = true;
      textarea.style.background = 'rgba(102, 126, 234, 0.05)';
      textarea.style.cursor = 'not-allowed';
    } else {
      textarea.disabled = false;
      textarea.style.background = 'var(--bg-secondary)';
      textarea.style.cursor = 'text';
    }
    
    document.getElementById('copy-modal').classList.add('show');
  }
}
function closeCopyModal(){
  document.getElementById('copy-modal').classList.remove('show');
  currentCopyVideoId = null;
}
function saveCopyText(){
  if(currentCopyVideoId){
    const v = videos.find(x=>x.id===currentCopyVideoId);
    if(v){
      const textarea = document.getElementById('copy-textarea');
      v.copyText = textarea.value;
      // Actualizar el texto original después de guardar
      textarea.dataset.originalText = textarea.value;
      render();
      // Actualizar el botón después de guardar exitosamente
      const saveBtn = document.querySelector('#copy-modal .btn-add');
      const hasText = v.copyText && v.copyText.trim() !== '';
      saveBtn.textContent = hasText ? 'Editar' : 'Guardar';
      saveBtn.dataset.originalText = saveBtn.textContent;
      
      // Si hay texto, volver a deshabilitar el textarea
      if (hasText) {
        textarea.disabled = true;
        textarea.style.background = 'rgba(102, 126, 234, 0.05)';
        textarea.style.cursor = 'not-allowed';
      }
    }
  }
  closeCopyModal();
}
function enableEdit(){
  const textarea = document.getElementById('copy-textarea');
  const saveBtn = document.querySelector('#copy-modal .btn-add');
  
  // Habilitar el textarea
  textarea.disabled = false;
  textarea.style.background = 'var(--bg-secondary)';
  textarea.style.cursor = 'text';
  textarea.focus();
  
  // Cambiar el botón a "Guardar"
  saveBtn.textContent = 'Guardar';
}

function updateCopyButton(){
  const textarea = document.getElementById('copy-textarea');
  const saveBtn = document.querySelector('#copy-modal .btn-add');
  
  // Si el textarea está deshabilitado, no hacer nada
  if (textarea.disabled) {
    return;
  }
  
  // Detectar si hay cambios respecto al texto original
  const hasChanges = textarea.value !== textarea.dataset.originalText;
  const hasText = textarea.value.trim() !== '';
  
  if (hasChanges) {
    // Si hay cambios, mostrar "Guardar"
    saveBtn.textContent = 'Guardar';
  } else {
    // Si no hay cambios, volver al estado original
    if (saveBtn.dataset.originalText) {
      saveBtn.textContent = saveBtn.dataset.originalText;
    }
  }
}
render();
</script>
