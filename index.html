<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel de Producción de Video</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

:root {
  --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  --secondary-gradient: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
  --success-gradient: linear-gradient(135deg, #13B497 0%, #0EA576 100%);
  --warning-gradient: linear-gradient(135deg, #FDB462 0%, #FB8072 100%);
  --info-gradient: linear-gradient(135deg, #8E9EAB 0%, #EEF2F3 100%);
  
  --bg-primary: #0F0F1E;
  --bg-secondary: #1A1A2E;
  --bg-card: #16213E;
  --bg-hover: #0F3460;
  
  --text-primary: #F3F4F6;
  --text-secondary: #D1D5DB;
  --text-muted: #9CA3AF;
  
  --border-primary: #2D3748;
  --border-secondary: #4A5568;
  --border-accent: #667EEA;
  
  --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
  --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
  --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
  --shadow-xl: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
  
  --radius-sm: 0.375rem;
  --radius-md: 0.5rem;
  --radius-lg: 0.75rem;
  --radius-xl: 1rem;
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: linear-gradient(135deg, #0F0F1E 0%, #1A1A2E 50%, #16213E 100%);
  color: var(--text-primary);
  min-height: 100vh;
  line-height: 1.6;
}

.app {
  padding: 2rem;
  max-width: 1400px;
  margin: 0 auto;
  animation: fadeInUp 0.6s ease-out;
}

@keyframes fadeInUp {
  from {
    opacity: 0;
    transform: translateY(20px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

@keyframes slideInRight {
  from {
    opacity: 0;
    transform: translateX(-20px);
  }
  to {
    opacity: 1;
    transform: translateX(0);
  }
}

@keyframes pulse {
  0%, 100% {
    transform: scale(1);
  }
  50% {
    transform: scale(1.05);
  }
}

@keyframes shimmer {
  0% {
    background-position: -200% 0;
  }
  100% {
    background-position: 200% 0;
  }
}

.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 2rem;
  background: var(--bg-card);
  padding: 1.5rem;
  border-radius: var(--radius-xl);
  border: 1px solid var(--border-primary);
  backdrop-filter: blur(10px);
  box-shadow: var(--shadow-lg);
  transition: all 0.3s ease;
}

.header:hover {
  transform: translateY(-2px);
  box-shadow: var(--shadow-xl);
  border-color: var(--border-accent);
}

.header h1 {
  font-size: 1.875rem;
  font-weight: 700;
  background: var(--primary-gradient);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 0.25rem;
}

.header p {
  font-size: 0.875rem;
  color: var(--text-secondary);
  font-weight: 400;
}

.add-btn {
  background: var(--primary-gradient);
  color: white;
  border: none;
  border-radius: var(--radius-lg);
  padding: 0.75rem 1.5rem;
  font-size: 0.875rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s ease;
  box-shadow: var(--shadow-md);
  position: relative;
  overflow: hidden;
}

.add-btn::before {
  content: '';
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
  transition: left 0.5s;
}

.add-btn:hover {
  transform: translateY(-2px);
  box-shadow: var(--shadow-lg);
}

.add-btn:hover::before {
  left: 100%;
}

.add-btn:active {
  transform: translateY(0);
}

.stats {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 1rem;
  margin-bottom: 2rem;
}

.stat {
  background: var(--bg-card);
  border-radius: var(--radius-xl);
  padding: 1.5rem;
  border: 1px solid var(--border-primary);
  backdrop-filter: blur(10px);
  box-shadow: var(--shadow-md);
  transition: all 0.3s ease;
  position: relative;
  overflow: hidden;
}

.stat::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: var(--primary-gradient);
}

.stat:hover {
  transform: translateY(-4px);
  box-shadow: var(--shadow-xl);
  border-color: var(--border-accent);
}

.stat-label {
  font-size: 0.75rem;
  color: var(--text-secondary);
  margin-bottom: 0.5rem;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  font-weight: 600;
}

.stat-val {
  font-size: 2rem;
  font-weight: 700;
  background: var(--primary-gradient);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.section-title {
  font-size: 0.875rem;
  font-weight: 600;
  color: var(--text-secondary);
  margin-bottom: 1rem;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  padding: 0.5rem 0;
  border-bottom: 2px solid var(--border-accent);
  display: inline-block;
}

.video-list {
  display: flex;
  flex-direction: column;
  gap: 0.75rem;
  margin-bottom: 2rem;
}

.video-row {
  background: var(--bg-card);
  border: 1px solid var(--border-primary);
  border-radius: var(--radius-xl);
  padding: 1rem;
  cursor: pointer;
  transition: all 0.3s ease;
  backdrop-filter: blur(10px);
  box-shadow: var(--shadow-sm);
  position: relative;
  overflow: hidden;
}

.video-row::before {
  content: '';
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(102, 126, 234, 0.1), transparent);
  transition: left 0.6s;
}

.video-row:hover {
  border-color: var(--border-accent);
  transform: translateX(4px);
  box-shadow: var(--shadow-lg);
}

.video-row:hover::before {
  left: 100%;
}

.video-row.expanded {
  border-color: var(--border-accent);
  box-shadow: var(--shadow-xl);
}

.row-main {
  display: flex;
  align-items: center;
  gap: 1rem;
}

.row-title {
  font-size: 1rem;
  font-weight: 600;
  color: var(--text-primary);
  min-width: 120px;
}

.stages {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  flex: 1;
}

.stage-pill {
  display: flex;
  align-items: center;
  gap: 0.25rem;
  padding: 0.375rem 0.75rem;
  border-radius: 20px;
  font-size: 0.75rem;
  font-weight: 600;
  border: 1px solid transparent;
  transition: all 0.3s ease;
  backdrop-filter: blur(10px);
}

.stage-pill.done {
  background: var(--success-gradient);
  color: white;
  border-color: #13B497;
  box-shadow: 0 2px 8px rgba(19, 180, 151, 0.3);
}

.stage-pill.active {
  background: var(--info-gradient);
  color: white;
  border-color: #8E9EAB;
  box-shadow: 0 2px 8px rgba(142, 158, 171, 0.3);
}

.stage-pill.pending {
  background: var(--bg-secondary);
  color: var(--text-secondary);
  border-color: var(--border-secondary);
}

.stage-sep {
  color: var(--border-secondary);
  font-size: 0.75rem;
  font-weight: 600;
}

.row-status {
  font-size: 0.75rem;
  font-weight: 600;
  padding: 0.375rem 0.75rem;
  border-radius: 20px;
  white-space: nowrap;
  backdrop-filter: blur(10px);
}

.status-entregado {
  background: var(--success-gradient);
  color: white;
  box-shadow: 0 2px 8px rgba(19, 180, 151, 0.3);
}

.status-edicion {
  background: var(--info-gradient);
  color: white;
  box-shadow: 0 2px 8px rgba(142, 158, 171, 0.3);
}

.status-con_link {
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  color: white;
  box-shadow: 0 2px 8px rgba(102, 126, 234, 0.3);
}

.status-grabacion {
  background: var(--warning-gradient);
  color: white;
  box-shadow: 0 2px 8px rgba(253, 180, 98, 0.3);
}

.status-copy {
  background: linear-gradient(135deg, #ff6b6b 0%, #ee5a24 100%);
  color: white;
  box-shadow: 0 2px 8px rgba(255, 107, 107, 0.3);
}

.status-pendiente {
  background: var(--bg-secondary);
  color: var(--text-secondary);
  border: 1px solid var(--border-secondary);
}

.progress-bar {
  width: 80px;
  height: 6px;
  background: var(--bg-secondary);
  border-radius: 3px;
  overflow: hidden;
  margin-left: 1rem;
  border: 1px solid var(--border-primary);
}

.progress-fill {
  height: 100%;
  border-radius: 3px;
  background: var(--primary-gradient);
  transition: width 0.6s ease;
  position: relative;
  overflow: hidden;
}

.progress-fill::after {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  bottom: 0;
  right: 0;
  background: linear-gradient(
    90deg,
    transparent,
    rgba(255, 255, 255, 0.3),
    transparent
  );
}

.detail {
  display: none;
  margin-top: 1rem;
  padding-top: 1rem;
  border-top: 1px solid var(--border-primary);
  animation: slideInRight 0.3s ease;
}

.video-row.expanded .detail {
  display: block;
}

.pipeline {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 0.75rem;
  margin-bottom: 1rem;
}

.pipe-stage {
  border-radius: var(--radius-lg);
  padding: 1rem;
  border: 1px solid var(--border-primary);
  background: var(--bg-secondary);
  backdrop-filter: blur(10px);
  transition: all 0.3s ease;
  position: relative;
  overflow: hidden;
}

.pipe-stage::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 2px;
  background: var(--primary-gradient);
  transform: scaleX(0);
  transition: transform 0.3s ease;
}

.pipe-stage.done {
  background: var(--success-gradient);
  border-color: #13B497;
  box-shadow: 0 4px 12px rgba(19, 180, 151, 0.3);
}

.pipe-stage.done::before {
  transform: scaleX(1);
}

.pipe-stage.active {
  background: var(--info-gradient);
  border-color: #8E9EAB;
  box-shadow: 0 4px 12px rgba(142, 158, 171, 0.3);
}

.pipe-stage.active::before {
  transform: scaleX(1);
}

.pipe-stage:hover {
  transform: translateY(-2px);
  box-shadow: var(--shadow-lg);
}

.pipe-name {
  font-size: 0.625rem;
  font-weight: 600;
  color: var(--text-secondary);
  margin-bottom: 0.75rem;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

.pipe-stage.done .pipe-name {
  color: white;
}

.pipe-stage.active .pipe-name {
  color: white;
}

.pipe-input {
  width: 100%;
  font-size: 0.875rem;
  background: transparent;
  border: none;
  border-bottom: 1px solid var(--border-secondary);
  padding: 0.25rem 0;
  color: var(--text-primary);
  outline: none;
  transition: all 0.3s ease;
}

.pipe-input:focus {
  border-bottom-color: var(--border-accent);
  background: rgba(102, 126, 234, 0.1);
  padding: 0.25rem 0.5rem;
  border-radius: var(--radius-sm);
}

.drive-input-wrapper {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  position: relative;
}

.drive-input-wrapper .pipe-input {
  flex: 1;
}

.link-btn {
  background: var(--primary-gradient);
  border: none;
  border-radius: var(--radius-sm);
  width: 28px;
  height: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 0.3s ease;
  flex-shrink: 0;
  box-shadow: var(--shadow-sm);
}

.link-btn:hover {
  transform: scale(1.1);
  box-shadow: var(--shadow-md);
}

.link-btn:active {
  transform: scale(0.95);
}

.link-btn svg {
  width: 14px;
  height: 14px;
  fill: white;
}

.link-btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
  transform: none;
}

.link-btn:disabled:hover {
  transform: none;
  box-shadow: var(--shadow-sm);
}

.stage-assignee {
  display: flex;
  align-items: center;
  gap: 0.25rem;
  margin-top: 0.5rem;
  padding: 0.25rem 0.5rem;
  background: rgba(102, 126, 234, 0.1);
  border-radius: var(--radius-sm);
  border: 1px solid rgba(102, 126, 234, 0.2);
  min-height: 24px;
}

.assignee-label {
  font-size: 0.625rem;
  color: var(--text-secondary);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

.assignee-name {
  font-size: 0.75rem;
  color: var(--border-accent);
  font-weight: 600;
  flex: 1;
}

.assignee-input {
  font-size: 0.75rem;
  background: transparent;
  border: none;
  color: var(--text-primary);
  font-weight: 600;
  width: 100%;
  outline: none;
  padding: 0;
}

.assignee-input::placeholder {
  color: var(--text-muted);
  font-style: italic;
}

.assignee-input:focus {
  background: rgba(102, 126, 234, 0.2);
  border-radius: var(--radius-sm);
  padding: 0.125rem 0.25rem;
}

.pipe-stage.done .stage-assignee {
  background: rgba(19, 180, 151, 0.1);
  border-color: rgba(19, 180, 151, 0.2);
}

.pipe-stage.done .assignee-name {
  color: white;
}

.pipe-stage.active .stage-assignee {
  background: rgba(142, 158, 171, 0.1);
  border-color: rgba(142, 158, 171, 0.2);
}

.pipe-stage.active .assignee-name {
  color: white;
}

.copy-text-btn {
  background: var(--primary-gradient);
  border: none;
  border-radius: var(--radius-sm);
  width: 24px;
  height: 24px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 0.3s ease;
  margin-left: 0.5rem;
  flex-shrink: 0;
  box-shadow: var(--shadow-sm);
}

.copy-text-btn:hover {
  transform: scale(1.1);
  box-shadow: var(--shadow-md);
}

.copy-text-btn:active {
  transform: scale(0.95);
}

.copy-text-btn svg {
  width: 12px;
  height: 12px;
  fill: white;
}

.copy-text-wrapper {
  display: flex;
  align-items: center;
  gap: 0.5rem;
}

.copy-modal-bg {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(15, 15, 30, 0.8);
  backdrop-filter: blur(10px);
  align-items: center;
  justify-content: center;
  z-index: 1000;
}

.copy-modal-bg.show {
  display: flex;
}

.copy-modal {
  background: var(--bg-card);
  border-radius: var(--radius-xl);
  padding: 2rem;
  width: 500px;
  max-width: 90%;
  border: 1px solid var(--border-primary);
  backdrop-filter: blur(20px);
  box-shadow: var(--shadow-xl);
}

.copy-modal h3 {
  font-size: 1.125rem;
  font-weight: 700;
  margin-bottom: 1.5rem;
  background: var(--primary-gradient);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.copy-textarea {
  width: 100%;
  min-height: 150px;
  font-size: 0.875rem;
  padding: 0.75rem 1rem;
  border: 1px solid var(--border-primary);
  border-radius: var(--radius-lg);
  color: var(--text-primary);
  background: var(--bg-secondary);
  resize: vertical;
  font-family: inherit;
  line-height: 1.5;
  transition: all 0.3s ease;
}

.copy-textarea:focus {
  outline: none;
  border-color: var(--border-accent);
  box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
}

.copy-modal-actions {
  display: flex;
  gap: 0.75rem;
  justify-content: flex-end;
  margin-top: 1.5rem;
}

.pipe-check {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  font-size: 0.875rem;
  color: var(--text-secondary);
  cursor: pointer;
  transition: all 0.3s ease;
}

.pipe-check:hover {
  color: var(--text-primary);
}

.pipe-check input {
  cursor: pointer;
  width: 1.25rem;
  height: 1.25rem;
  accent-color: var(--border-accent);
}

.pipe-val {
  font-size: 0.875rem;
  color: var(--text-secondary);
  font-weight: 500;
}

.detail-actions {
  display: flex;
  gap: 0.75rem;
  justify-content: flex-end;
  margin-top: 1rem;
}

.del-btn {
  font-size: 0.75rem;
  color: var(--text-muted);
  background: transparent;
  border: 1px solid var(--border-secondary);
  border-radius: var(--radius-md);
  cursor: pointer;
  padding: 0.5rem 1rem;
  font-weight: 600;
  transition: all 0.3s ease;
}

.del-btn:hover {
  color: #ff6b6b;
  border-color: #ff6b6b;
  background: rgba(255, 107, 107, 0.1);
  transform: translateY(-1px);
}

.modal-bg {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(15, 15, 30, 0.8);
  backdrop-filter: blur(10px);
  align-items: center;
  justify-content: center;
  z-index: 1000;
  animation: fadeIn 0.3s ease;
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

.modal-bg.show {
  display: flex;
}

.modal {
  background: var(--bg-card);
  border-radius: var(--radius-xl);
  padding: 2rem;
  width: 450px;
  border: 1px solid var(--border-primary);
  backdrop-filter: blur(20px);
  box-shadow: var(--shadow-xl);
  animation: slideInUp 0.3s ease;
}

@keyframes slideInUp {
  from {
    opacity: 0;
    transform: translateY(20px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.modal h2 {
  font-size: 1.25rem;
  font-weight: 700;
  margin-bottom: 1.5rem;
  background: var(--primary-gradient);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.modal label {
  display: block;
  font-size: 0.875rem;
  color: var(--text-secondary);
  margin-bottom: 0.5rem;
  margin-top: 1rem;
  font-weight: 600;
}

.modal input {
  width: 100%;
  font-size: 1rem;
  padding: 0.75rem 1rem;
  border: 1px solid var(--border-primary);
  border-radius: var(--radius-lg);
  color: var(--text-primary);
  background: var(--bg-secondary);
  transition: all 0.3s ease;
}

.modal input:focus {
  outline: none;
  border-color: var(--border-accent);
  box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
}

/* Estilos específicos para input de fecha */
input[type="date"] {
  color-scheme: dark; /* Forzar modo oscuro para el calendario */
}

/* Estilo para el icono del calendario en navegadores WebKit (Chrome, Safari, Edge) */
input[type="date"]::-webkit-calendar-picker-indicator {
  background: transparent;
  bottom: 0;
  color: white;
  cursor: pointer;
  height: auto;
  left: 0;
  position: absolute;
  right: 0;
  top: 0;
  width: auto;
  filter: invert(1) brightness(2); /* Hacer el icono blanco */
}

/* Estilo para el icono del calendario en Firefox */
input[type="date"]::-moz-calendar-picker-indicator {
  background: transparent;
  bottom: 0;
  color: white;
  cursor: pointer;
  height: auto;
  left: 0;
  position: absolute;
  right: 0;
  top: 0;
  width: auto;
  filter: invert(1) brightness(2); /* Hacer el icono blanco */
}

/* Prevenir que el calendario interfiera con otros elementos */
.modal {
  position: relative;
  z-index: 1001;
}

.modal-actions {
  position: relative;
  z-index: 1002;
  margin-top: 2rem;
  justify-content: flex-end;
  display: flex;
  gap: 0.75rem;
}


/* Estilos para el botón del calendario personalizado */
.calendar-btn {
  background: var(--primary-gradient);
  border: none;
  border-radius: var(--radius-lg);
  padding: 0.75rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.3s ease;
  flex-shrink: 0;
  width: 44px;
  height: 44px;
}

/* Posicionar el calendario arriba del botón */
#new-delivery-date-hidden {
  position: absolute;
  z-index: 1003;
  left: 0;
  top: 0;
  width: 1px;
  height: 1px;
  opacity: 0;
  pointer-events: none;
}

/* Asegurar que el modal tenga posición relativa para el calendario */
.modal {
  position: relative;
  z-index: 1001;
  overflow: visible;
}

.calendar-btn:hover {
  transform: scale(1.05);
  box-shadow: var(--shadow-md);
}

.calendar-btn:active {

@media (max-width: 768px) {
  .app {

  .stats {

</style>
</head>
<body>
<div class="app">

<div class="header">
  <div>
    <h1>Producción de contenido</h1>
    <p id="subtitle">Semana actual · estado reactivo por etapa</p>
  </div>
  <button class="add-btn" onclick="openModal()">+ Agregar video</button>
</div>

<div class="stats">
  <div class="stat"><div class="stat-label">Total videos</div><div class="stat-val" id="st-total">0</div></div>
  <div class="stat"><div class="stat-label">Entregados</div><div class="stat-val" id="st-done">0</div></div>
  <div class="stat"><div class="stat-label">En proceso</div><div class="stat-val" id="st-active">0</div></div>
  <div class="stat"><div class="stat-label">Pendientes</div><div class="stat-val" id="st-pending">0</div></div>
</div>

<div id="groups"></div>

<div class="modal-bg" id="modal" onclick="closeModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <h2>Nuevo video</h2>
    <label>Título del video</label>
    <input id="new-title" placeholder="Ej: Video tutorial #1" />
    <label>Grupo / proyecto</label>
    <input id="new-group" placeholder="Ej: MKM, Pauta, Orgánico..." />
    <label>Fecha de entrega (opcional)</label>
    <div style="display: flex; gap: 0.5rem; align-items: center;">
      <input id="new-delivery-date" type="text" placeholder="Selecciona una fecha..." readonly onclick="event.stopPropagation()" style="flex: 1;" />
      <button type="button" class="calendar-btn" onclick="openDatePicker(event)" title="Seleccionar fecha">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="white">
          <path d="M19 3h-1V1h-2v2H8V1H6v2H5c-1.11 0-1.99.9-1.99 2L3 19c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V8h14v11zM7 10h5v5H7z"/>
        </svg>
      </button>
    </div>
    <input id="new-delivery-date-hidden" type="date" style="display: none;" />
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-add" onclick="addVideo()">Agregar</button>
    </div>
  </div>
</div>
</div>

<div class="copy-modal-bg" id="copy-modal" onclick="closeCopyModal()">
  <div class="copy-modal" onclick="event.stopPropagation()">
    <h3>Texto del Copy</h3>
    <textarea class="copy-textarea" id="copy-textarea" placeholder="Escribe aquí el texto del copy, guion, o información importante del video..." oninput="updateCopyButton()"></textarea>
    <div class="copy-modal-actions">
      <button class="btn-cancel" onclick="closeCopyModal()">Cancelar</button>
      <button class="btn-add" onclick="this.textContent === 'Editar' ? enableEdit() : saveCopyText()">Guardar</button>
    </div>
  </div>
</div>

<script type="module">
// Importar Supabase como módulo ES6
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

// Configuración de Supabase
const supabaseUrl = 'https://emvvssrbuuralgooajpb.supabase.co';
const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVtdnZzc3JidXVyYWxnb29hanBiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0NDE1ODYsImV4cCI6MjA5MjAxNzU4Nn0.7jHzzuoJqx6CoQouyhVNQPhZ-9HqBhF50gq7fOvnEq0';

// Crear cliente de Supabase
const supabase = createClient(supabaseUrl, supabaseKey);

// Hacer supabase disponible globalmente para otras funciones
window.supabase = supabase;

</script>
<script>
// Variables globales
let videos = [];
let currentCopyVideoId = null;

// Funciones del modal (definidas temprano para evitar errores de referencia)
function openModal(){document.getElementById('modal').classList.add('show');}
function closeModal(){
  document.getElementById('modal').classList.remove('show');
  document.getElementById('new-title').value='';
  document.getElementById('new-group').value='';
  document.getElementById('new-delivery-date').value='';
  document.getElementById('new-delivery-date-hidden').value='';
}

// Función para abrir el selector de fecha
function openDatePicker(e){
  const hiddenInput = document.getElementById('new-delivery-date-hidden');
  const textInput = document.getElementById('new-delivery-date');
  const button = e.target.closest('.calendar-btn');
  
  // Prevenir que el evento se propague
  e.stopPropagation();
  
  // Posicionar el input oculto donde está el botón
  const rect = button.getBoundingClientRect();
  hiddenInput.style.left = rect.left + 'px';
  hiddenInput.style.top = rect.top + 'px';
  hiddenInput.style.width = rect.width + 'px';
  hiddenInput.style.height = rect.height + 'px';
  hiddenInput.style.opacity = '1';
  hiddenInput.style.pointerEvents = 'auto';
  
  // Usar showPicker() si está disponible, sino focus() como fallback
  setTimeout(() => {
    if (hiddenInput.showPicker) {
      hiddenInput.showPicker();
    } else {
      hiddenInput.focus();
    }
  }, 10);
}

// Cargar videos desde Supabase al iniciar
async function loadVideos() {
  console.log('Iniciando carga de videos...');
  try {
    console.log('Conectando a Supabase...');
    const { data, error } = await window.supabase
      .from('videos')
      .select('*')
      .order('created_at', { ascending: false });
    
    console.log('Respuesta de Supabase:', { data, error });
    
    if (error) {
      console.error('Error de Supabase:', error);
      throw error;
    }
    
    videos = data || [];
    console.log('Videos cargados:', videos.length, videos);
    
    // Forzar render después de cargar
    if (videos.length > 0) {
      render();
    }
  } catch (error) {
    console.error('Error cargando videos:', error);
    // Si hay error, mantener videos vacíos
    videos = [];
    // Mostrar mensaje al usuario
    alert('Error al cargar videos. Verifica tu conexión a internet.');
  }
}

// Guardar video en Supabase
async function saveVideoToSupabase(video) {
  try {
    const { data, error } = await window.supabase
      .from('videos')
      .upsert(video)
      .select();
    
    if (error) {
      console.error('Error de Supabase:', error);
      throw error;
    }
    
    // Validar que tengamos datos de respuesta
    if (!data || data.length === 0) {
      throw new Error('No se recibieron datos de Supabase');
    }
    
    console.log('Video guardado exitosamente:', data[0]);
    return data;
  } catch (error) {
    console.error('Error guardando video:', error.message);
    return null;
  }
}

// Eliminar video de Supabase
async function deleteVideoFromSupabase(videoId) {
  try {
    const { error } = await window.supabase
      .from('videos')
      .delete()
      .eq('id', videoId);
    
    if (error) throw error;
    return true;
  } catch (error) {
    console.error('Error eliminando video:', error);
    return false;
  }
}

function getStatus(v){
  if(v.delivery_ok&&v.drive_link&&v.edit_link) return 'entregado';
  if(v.edit_link) return 'edicion';
  if(v.drive_link) return 'con_link';
  return 'pendiente';
}
function getStatusLabel(s){
  return{entregado:'Entregado',edicion:'En edición',con_link:'Con link',grabacion:'Grabación',pendiente:'Pendiente'}[s];
}
function getProgress(v){
  let s=getStatus(v);
  return{entregado:100,edicion:75,con_link:55,grabacion:35,pendiente:10}[s];
}
function stageState(done,active){
  if(done) return 'done'; if(active) return 'active'; return 'pending';
}
function getPipeStages(v){
  let st=getStatus(v);
  let copyDone=v.copy_ok;
  let recDone=v.recording_ok;
  let upDone=!!v.drive_link;
  let editDone=!!v.edit_link;
  let delivDone=v.delivery_ok;
  return[
    {name:'Copy',state:stageState(copyDone,!copyDone),field:'copy'},
    {name:'Grabación',state:stageState(recDone,copyDone&&!recDone),field:'rec'},
    {name:'Drive link',state:stageState(upDone,recDone&&!upDone),field:'drive'},
    {name:'Edición',state:stageState(editDone,upDone&&!editDone),field:'edit'},
    {name:'Entrega',state:stageState(delivDone,editDone&&!delivDone),field:'deliv'},
  ];
}

function render(){
  const groups={};
  videos.forEach(v=>{
    if(!groups[v.group_name]) groups[v.group_name]=[];
    groups[v.group_name].push(v);
  });
  let html='';
  Object.entries(groups).forEach(([g,vids])=>{
    html+=`<div class="section-title" style="margin-top:1rem">${g}</div><div class="video-list">`;
    vids.forEach(v=>{
      const st=getStatus(v);
      const prog=getProgress(v);
      const stages=getPipeStages(v);
      const pills=stages.map(s=>`<span class="stage-pill ${s.state}">${s.name}</span>`).join(`<span class="stage-sep">></span>`);
      const pipeHTML=stages.map(s=>{
        let inner='';
        if(s.field==='copy'){
          inner=`<div class="copy-text-wrapper">
            <label class="pipe-check"><input type="checkbox" ${v.copy_ok?'checked':''} onchange="update(${v.id},'copy_ok',this.checked)"> Aprobado</label>
            <button class="copy-text-btn" onclick="openCopyModal(${v.id})" title="Agregar texto del copy">
              <svg viewBox="0 0 24 24">
                <path d="M14,2H6A2,2 0 0,0 4,4V20A2,2 0 0,0 6,22H18A2,2 0 0,0 20,20V8L14,2M18,20H6V4H13V9H18V20M10,19L12,15H9V10H15V15L13,19H10Z"/>
              </svg>
            </button>
          </div>`;
        }
        else if(s.field==='rec'){
          inner=`<label class="pipe-check"><input type="checkbox" ${v.recording_ok?'checked':''} ${!v.copy_ok?'disabled':''} onchange="update(${v.id},'recording_ok',this.checked)"> Listo</label>`;
        }
        else if(s.field==='drive'){
          inner=`<div class="drive-input-wrapper">
            <input class="pipe-input" placeholder="Pegar enlace Drive..." value="${v.drive_link||''}" onchange="update(${v.id},'drive_link',this.value)">
            <button class="link-btn" onclick="openDriveLink('${v.drive_link||''}')" ${!v.drive_link?'disabled':''} title="Abrir enlace Drive">
              <svg viewBox="0 0 24 24">
                <path d="M3.9 12c0-1.71 1.39-3.1 3.1-3.1h4V7H7c-2.76 0-5 2.24-5 5s2.24 5 5 5h4v-1.9H7c-1.71 0-3.1-1.39-3.1-3.1zM8 13h8v-2H8v2zm9-6h-4v1.9h4c1.71 0 3.1 1.39 3.1 3.1s-1.39 3.1-3.1 3.1h-4V17h4c2.76 0 5-2.24 5-5s-2.24-5-5-5z"/>
              </svg>
            </button>
          </div>`;
        }
        else if(s.field==='edit'){
          inner=`<div class="drive-input-wrapper">
            <input class="pipe-input" placeholder="Pegar enlace del video editado..." value="${v.edit_link||''}" onchange="update(${v.id},'edit_link',this.value)">
            <button class="link-btn" onclick="openDriveLink('${v.edit_link||''}')" ${!v.edit_link?'disabled':''} title="Abrir video editado">
              <svg viewBox="0 0 24 24">
                <path d="M3.9 12c0-1.71 1.39-3.1 3.1-3.1h4V7H7c-2.76 0-5 2.24-5 5s2.24 5 5 5h4v-1.9H7c-1.71 0-3.1-1.39-3.1-3.1zM8 13h8v-2H8v2zm9-6h-4v1.9h4c1.71 0 3.1 1.39 3.1 3.1s-1.39 3.1-3.1 3.1h-4V17h4c2.76 0 5-2.24 5-5s-2.24-5-5-5z"/>
              </svg>
            </button>
          </div>`;
        }
        else if(s.field==='deliv'){
          inner=`<div style="display:flex;flex-direction:column;gap:0.5rem">
            <label class="pipe-check"><input type="checkbox" ${v.delivery_ok?'checked':''} onchange="update(${v.id},'delivery_ok',this.checked)"> Listo</label>
            <input class="pipe-input" type="date" value="${v.delivery_date?toInputDate(v.delivery_date):''}" onchange="update(${v.id},'delivery_date',toDisplayDate(this.value))">
          </div>`;
        }
        else{inner=`<span class="pipe-val">${s.state==='done'?'Listo':'Pendiente'}</span>`;}
        return`<div class="pipe-stage ${s.state}"><div class="pipe-name">${s.name}</div>${inner}</div>`;
      }).join('');
      html+=`<div class="video-row${v.expanded?' expanded':''}" id="row-${v.id}">
        <div class="row-main" onclick="toggle(${v.id})">
          <span class="row-title">${v.title}</span>
          <div class="stages">${pills}</div>
          <span class="row-status status-${st}">${getStatusLabel(st)}</span>
          <div class="progress-bar"><div class="progress-fill" style="width:${prog}%"></div></div>
        </div>
        <div class="detail">
          <div class="pipeline">${pipeHTML}</div>
          <div class="detail-actions"><button class="del-btn" onclick="deleteVideo(${v.id},event)">Eliminar</button></div>
        </div>
      </div>`;
    });
    html+='</div>';
  });
  if(!videos.length) html='<div class="empty">No hay videos. Agrega uno para comenzar.</div>';
  document.getElementById('groups').innerHTML=html;
  const total=videos.length;
  const done=videos.filter(v=>getStatus(v)==='entregado').length;
  const active=videos.filter(v=>['edicion','con_link','grabacion'].includes(getStatus(v))).length;
  const pend=videos.filter(v=>getStatus(v)==='pendiente').length;
  document.getElementById('st-total').textContent=total;
  document.getElementById('st-done').textContent=done;
  document.getElementById('st-active').textContent=active;
  document.getElementById('st-pending').textContent=pend;
}

function toggle(id){
  const v=videos.find(x=>x.id===id);
  if(v) v.expanded=!v.expanded;
  render();
}
async function update(id,field,val){
  const v=videos.find(x=>x.id===id);
  if(v){
    v[field]=val;
    // Si se aprueba el copy, desmarcar automáticamente la grabación
    if(field==='copy_ok' && val===true){
      v.recording_ok = false;
    }
    
    // Guardar en Supabase
    await saveVideoToSupabase(v);
    render();
  }
}
async function deleteVideo(id,e){
  e.stopPropagation();
  
  // Eliminar de Supabase
  const success = await deleteVideoFromSupabase(id);
  if (success) {
    videos=videos.filter(x=>x.id!==id);
    render();
  } else {
    alert('Error al eliminar el video');
  }
}
async function addVideo(){
  const t=document.getElementById('new-title').value.trim();
  const g=document.getElementById('new-group').value.trim()||'General';
  const deliveryDateInput = document.getElementById('new-delivery-date-hidden').value;
  
  console.log('Datos del nuevo video:', { title: t, group: g, deliveryDateInput });
  
  // Solo validar el título
  if(!t){
    alert('El título del video es obligatorio');
    return;
  }
  
  // Obtener botón y mostrar estado de carga
  const addBtn = document.querySelector('.btn-add');
  const originalText = addBtn.textContent;
  addBtn.textContent = 'Guardando...';
  addBtn.disabled = true;
  
  const deliveryDateFormatted = deliveryDateInput ? toDisplayDate(deliveryDateInput) : '';
  console.log('Fecha formateada:', { deliveryDateInput, deliveryDateFormatted });
  
  const newVideo = {
    title: t,
    group_name: g,
    copy_ok: false,
    recording_ok: false,
    drive_link: '',
    edit_link: '',
    delivery_ok: false,
    delivery_date: deliveryDateFormatted,
    expanded: false,
    copy_text: '',
    created_at: new Date().toISOString()
  };
  
  console.log('Objeto a guardar:', newVideo);
  
  try {
    // Guardar en Supabase
    const savedVideo = await saveVideoToSupabase(newVideo);
    if (savedVideo && savedVideo.length > 0) {
      videos.push(savedVideo[0]);
      closeModal();
      render();
    } else {
      alert('Error al agregar el video. Por favor, verifica tu conexión e intenta nuevamente.');
    }
  } catch (error) {
    console.error('Error inesperado:', error);
    alert('Ocurrió un error inesperado. Intenta nuevamente.');
  } finally {
    // Restaurar botón
    addBtn.textContent = originalText;
    addBtn.disabled = false;
  }
}
function toInputDate(d){
  if(!d) return '';
  // Si ya está en formato YYYY-MM-DD, retornarlo directamente
  if(d.includes('-')) return d;
  // Convertir de YYYY/MM/DD a YYYY-MM-DD
  const p=d.split('/');
  if(p.length===3) return`${p[0]}-${p[1].padStart(2,'0')}-${p[2].padStart(2,'0')}`;
  return d;
}
function toDisplayDate(d){
  if(!d) return '';
  // Si ya está en formato YYYY/MM/DD, retornarlo directamente
  if(d.includes('/') && d.split('/')[0].length === 4) return d;
  // Convertir de YYYY-MM-DD a YYYY/MM/DD
  const p=d.split('-');
  if(p.length===3) return`${p[0]}/${p[1]}/${p[2]}`;
  return d;
}
function openDriveLink(url){
  if(!url) return;
  // Validar que sea una URL válida
  if(url.startsWith('http')){
    window.open(url, '_blank');
  } else {
    // Si no tiene protocolo, agregar https://
    window.open('https://' + url, '_blank');
  }
}
function openCopyModal(videoId){
  currentCopyVideoId = videoId;
  const v = videos.find(x=>x.id===videoId);
  if(v){
    const textarea = document.getElementById('copy-textarea');
    textarea.value = v.copy_text || '';
    // Guardar el texto original para detectar cambios
    textarea.dataset.originalText = v.copy_text || '';
    const saveBtn = document.querySelector('#copy-modal .btn-add');
    const hasText = v.copy_text && v.copy_text.trim() !== '';
    saveBtn.textContent = hasText ? 'Editar' : 'Guardar';
    saveBtn.dataset.originalText = saveBtn.textContent; // Guardar estado original
    
    // Si hay texto, deshabilitar el textarea hasta que se haga clic en Editar
    if (hasText) {
      textarea.disabled = true;
      textarea.style.background = 'rgba(102, 126, 234, 0.05)';
      textarea.style.cursor = 'not-allowed';
    } else {
      textarea.disabled = false;
      textarea.style.background = 'var(--bg-secondary)';
      textarea.style.cursor = 'text';
    }
    
    document.getElementById('copy-modal').classList.add('show');
  }
}
function closeCopyModal(){
  document.getElementById('copy-modal').classList.remove('show');
  currentCopyVideoId = null;
}
async function saveCopyText(){
  if(currentCopyVideoId){
    const v = videos.find(x=>x.id===currentCopyVideoId);
    if(v){
      const textarea = document.getElementById('copy-textarea');
      v.copy_text = textarea.value;
      // Actualizar el texto original después de guardar
      textarea.dataset.originalText = textarea.value;
      
      // Guardar en Supabase
      await saveVideoToSupabase(v);
      render();
      
      // Actualizar el botón después de guardar exitosamente
      const saveBtn = document.querySelector('#copy-modal .btn-add');
      const hasText = v.copy_text && v.copy_text.trim() !== '';
      saveBtn.textContent = hasText ? 'Editar' : 'Guardar';
      saveBtn.dataset.originalText = saveBtn.textContent;
      
      // Si hay texto, volver a deshabilitar el textarea
      if (hasText) {
        textarea.disabled = true;
        textarea.style.background = 'rgba(102, 126, 234, 0.05)';
        textarea.style.cursor = 'not-allowed';
      }
    }
  }
  closeCopyModal();
}
function enableEdit(){
  const textarea = document.getElementById('copy-textarea');
  const saveBtn = document.querySelector('#copy-modal .btn-add');
  
  // Habilitar el textarea
  textarea.disabled = false;
  textarea.style.background = 'var(--bg-secondary)';
  textarea.style.cursor = 'text';
  textarea.focus();
  
  // Cambiar el botón a "Guardar"
  saveBtn.textContent = 'Guardar';
}

function updateCopyButton(){
  const textarea = document.getElementById('copy-textarea');
  const saveBtn = document.querySelector('#copy-modal .btn-add');
  
  // Si el textarea está deshabilitado, no hacer nada
  if (textarea.disabled) {
    return;
  }
  
  // Detectar si hay cambios respecto al texto original
  const hasChanges = textarea.value !== textarea.dataset.originalText;
  const hasText = textarea.value.trim() !== '';
  
  if (hasChanges) {
    // Si hay cambios, mostrar "Guardar"
    saveBtn.textContent = 'Guardar';
  } else {
    // Si no hay cambios, volver al estado original
    if (saveBtn.dataset.originalText) {
      saveBtn.textContent = saveBtn.dataset.originalText;
    }
  }
}
// Configurar listener para el input de fecha (se ejecuta una sola vez)
document.addEventListener('DOMContentLoaded', () => {
  const hiddenInput = document.getElementById('new-delivery-date-hidden');
  const textInput = document.getElementById('new-delivery-date');
  
  // Listener para actualizar el input visible cuando cambia el input oculto
  hiddenInput.addEventListener('change', function() {
    if (this.value) {
      const formattedDate = toDisplayDate(this.value);
      textInput.value = formattedDate;
    } else {
      textInput.value = '';
    }
  });
  
  // Iniciar la aplicación
  loadVideos();
  render();
});
</script>
</body>
</html>
